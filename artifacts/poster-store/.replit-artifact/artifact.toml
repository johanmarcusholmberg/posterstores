kind = "web"
previewPath = "/"
title = "Poster Webstore"
version = "1.0.0"
id = "artifacts/poster-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26052

[services.development]
run = "pnpm --filter @workspace/poster-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/poster-store", "run", "build" ]
publicDir = "artifacts/poster-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26052"
BASE_PATH = "/"
